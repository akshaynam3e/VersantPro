<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — VersantPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00C8FF;
      --primary-dim: rgba(0,200,255,0.12);
      --success: #00E676;
      --warn: #FFB800;
      --danger: #FF4444;
      --dark: #060B14;
      --dark2: #0D1526;
      --dark3: #162035;
      --card: rgba(13,21,38,0.92);
      --border: rgba(0,200,255,0.16);
      --text: #E8EDF5;
      --muted: #6B7A99;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--dark); color:var(--text); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; }

    /* BG */
    .bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .bg-canvas::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 80% 60% at 20% 20%, rgba(0,100,200,0.08) 0%,transparent 60%), radial-gradient(ellipse 60% 80% at 80% 80%, rgba(0,200,255,0.05) 0%,transparent 60%); }
    .bg-grid { position:absolute; inset:0; background-image: linear-gradient(rgba(0,200,255,0.02) 1px,transparent 1px), linear-gradient(90deg,rgba(0,200,255,0.02) 1px,transparent 1px); background-size:60px 60px; }

    /* HEADER */
    .header { padding:0 20px; height:60px; background:rgba(6,11,20,0.95); backdrop-filter:blur(24px); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1000; display:flex; align-items:center; justify-content:space-between; }
    .header-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .header-emblem { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,var(--primary),#0080CC); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:15px; font-weight:800; color:#000; }
    .header-name { font-family:var(--font-head); font-size:17px; font-weight:800; color:#fff; }
    .header-name span { color:var(--primary); }
    .header-actions { display:flex; gap:8px; align-items:center; }
    .btn-back { padding:7px 16px; border-radius:9999px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:var(--text); font-size:13px; font-weight:600; cursor:pointer; font-family:var(--font-body); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:.2s; }
    .btn-back:hover { background:rgba(255,255,255,0.12); }
    .btn-chat-header { padding:7px 16px; border-radius:9999px; background:var(--primary-dim); border:1px solid var(--border); color:var(--primary); font-size:13px; font-weight:600; cursor:pointer; font-family:var(--font-head); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:.2s; }
    .btn-chat-header:hover { background:rgba(0,200,255,0.22); }

    /* LOADING */
    #loadingScreen { position:fixed; inset:0; background:var(--dark); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; z-index:9999; }
    .load-spinner { width:40px; height:40px; border:3px solid var(--dark3); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* AUTH MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(4,8,18,0.97); backdrop-filter:blur(12px); display:none; align-items:center; justify-content:center; z-index:10000; }
    .modal-overlay.active { display:flex; }
    .modal-box { background:var(--dark2); border:1px solid var(--border); border-radius:28px; width:92%; max-width:380px; padding:36px 28px; }
    .modal-box h2 { font-family:var(--font-head); font-size:22px; font-weight:800; color:#fff; text-align:center; margin-bottom:6px; }
    .modal-box p { font-size:13px; color:var(--muted); text-align:center; margin-bottom:24px; }
    .form-input { width:100%; padding:13px 16px; background:var(--dark); border:1.5px solid rgba(255,255,255,0.07); color:#fff; border-radius:11px; font-size:14px; font-family:var(--font-body); margin-bottom:10px; outline:none; transition:.2s; }
    .form-input:focus { border-color:var(--primary); }
    .form-input::placeholder { color:var(--muted); }
    .btn-full { width:100%; padding:14px; border:none; border-radius:11px; font-size:14px; font-family:var(--font-head); font-weight:700; cursor:pointer; background:linear-gradient(135deg,var(--primary),#0080CC); color:#000; margin-top:4px; transition:.2s; }
    .btn-full:hover { transform:translateY(-1px); }
    .auth-err { color:#FF6B6B; font-size:12px; text-align:center; margin-top:8px; min-height:16px; }
    .modal-link { text-align:center; font-size:12px; color:var(--muted); margin-top:14px; }
    .modal-link a { color:var(--primary); cursor:pointer; text-decoration:none; }

    /* MAIN LAYOUT */
    .main { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:28px 16px 80px; }

    /* PROFILE HERO */
    .profile-hero { background:linear-gradient(135deg,#0a1830,#0d2040); border:1px solid var(--border); border-radius:28px; overflow:hidden; margin-bottom:20px; }
    .hero-cover { height:120px; background:linear-gradient(135deg,rgba(0,200,255,0.15),rgba(0,128,204,0.08)); position:relative; }
    .hero-cover-edit { position:absolute; top:12px; right:12px; }
    .hero-body { padding:0 24px 24px; }
    .avatar-wrap { display:flex; align-items:flex-end; justify-content:space-between; margin-top:-36px; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
    .avatar-ring { width:72px; height:72px; border-radius:50%; border:3px solid var(--dark2); background:linear-gradient(135deg,var(--primary),#0080CC); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:26px; font-weight:800; color:#000; position:relative; cursor:pointer; flex-shrink:0; }
    .avatar-img { width:72px; height:72px; border-radius:50%; border:3px solid var(--dark2); object-fit:cover; display:none; }
    .avatar-edit-badge { position:absolute; bottom:0; right:0; width:22px; height:22px; border-radius:50%; background:var(--primary); border:2px solid var(--dark2); display:flex; align-items:center; justify-content:center; font-size:10px; }
    .follow-btn-wrap { display:flex; gap:8px; flex-wrap:wrap; }
    .btn-follow { padding:9px 22px; border-radius:9999px; font-family:var(--font-head); font-size:13px; font-weight:700; cursor:pointer; transition:.2s; border:none; }
    .btn-follow.follow { background:linear-gradient(135deg,var(--primary),#0080CC); color:#000; }
    .btn-follow.following { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); color:var(--text); }
    .btn-follow.following:hover { background:rgba(255,68,68,0.1); border-color:rgba(255,68,68,0.3); color:#FF6B6B; }
    .btn-msg { padding:9px 18px; border-radius:9999px; font-family:var(--font-head); font-size:13px; font-weight:700; cursor:pointer; transition:.2s; background:rgba(0,200,255,0.08); border:1px solid var(--border); color:var(--primary); text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .btn-msg:hover { background:rgba(0,200,255,0.16); }
    .btn-edit-profile { padding:9px 18px; border-radius:9999px; font-family:var(--font-head); font-size:13px; font-weight:700; cursor:pointer; transition:.2s; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); color:var(--text); }
    .btn-edit-profile:hover { background:rgba(255,255,255,0.12); }
    .profile-name { font-family:var(--font-head); font-size:22px; font-weight:800; color:#fff; margin-bottom:3px; }
    .profile-username { font-size:13px; color:var(--muted); margin-bottom:10px; }
    .profile-bio { font-size:14px; color:#94A3B8; line-height:1.6; margin-bottom:12px; max-width:480px; }
    .profile-meta { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
    .meta-item { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); }
    .profile-stats { display:flex; gap:20px; flex-wrap:wrap; }
    .pstat { text-align:center; cursor:pointer; transition:.2s; }
    .pstat:hover .pstat-num { color:#fff; }
    .pstat-num { font-family:var(--font-head); font-size:18px; font-weight:800; color:var(--primary); }
    .pstat-lbl { font-size:11px; color:var(--muted); margin-top:1px; }

    /* TABS */
    .tab-bar { display:flex; gap:4px; background:var(--dark2); border:1px solid var(--border); border-radius:14px; padding:4px; margin-bottom:20px; }
    .tab-btn { flex:1; padding:9px 8px; border:none; border-radius:10px; font-family:var(--font-head); font-size:12px; font-weight:700; cursor:pointer; transition:.2s; background:transparent; color:var(--muted); }
    .tab-btn.active { background:var(--primary); color:#000; }

    /* STATS SECTION */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
    .stat-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:18px; text-align:center; backdrop-filter:blur(20px); }
    .stat-icon { font-size:24px; margin-bottom:6px; }
    .stat-val { font-family:var(--font-head); font-size:26px; font-weight:800; color:var(--primary); }
    .stat-lbl { font-size:11px; color:var(--muted); margin-top:2px; }

    /* RECENT LEVELS */
    .section-title { font-family:var(--font-head); font-size:13px; font-weight:700; color:var(--primary); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
    .levels-list { display:grid; gap:8px; }
    .level-row { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 18px; display:flex; align-items:center; gap:14px; }
    .level-num { font-family:var(--font-head); font-size:16px; font-weight:800; color:var(--primary); width:60px; flex-shrink:0; }
    .level-info { flex:1; }
    .level-date { font-size:11px; color:var(--muted); }
    .level-score-bar { height:4px; background:var(--dark3); border-radius:9999px; overflow:hidden; margin-top:6px; }
    .level-score-fill { height:100%; background:linear-gradient(90deg,var(--success),#67E8F9); border-radius:9999px; }
    .level-score-num { font-family:var(--font-head); font-size:15px; font-weight:800; color:var(--success); flex-shrink:0; }

    /* BADGES */
    .badges-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .badge-card { background:var(--dark3); border:1px solid rgba(255,255,255,0.06); border-radius:16px; padding:16px 10px; text-align:center; transition:.2s; }
    .badge-card.earned { border-color:rgba(255,184,0,0.4); background:rgba(255,184,0,0.06); }
    .badge-icon { font-size:28px; margin-bottom:6px; filter:grayscale(1) brightness(0.4); }
    .badge-card.earned .badge-icon { filter:none; }
    .badge-name { font-family:var(--font-head); font-size:11px; font-weight:700; color:var(--muted); }
    .badge-card.earned .badge-name { color:#FFB800; }
    .badge-sub { font-size:10px; color:var(--muted); margin-top:3px; }
    .badge-bar { margin-top:6px; background:var(--dark); height:3px; border-radius:9999px; overflow:hidden; }
    .badge-bar-fill { height:100%; background:linear-gradient(90deg,#FFB800,#FF8C00); border-radius:9999px; }

    /* FOLLOWERS MODAL */
    .list-modal { position:fixed; inset:0; background:rgba(4,8,18,0.97); backdrop-filter:blur(16px); z-index:9000; display:none; align-items:center; justify-content:center; padding:16px; }
    .list-modal.show { display:flex; }
    .list-box { background:var(--dark2); border:1px solid var(--border); border-radius:24px; width:100%; max-width:420px; max-height:80vh; display:flex; flex-direction:column; overflow:hidden; }
    .list-header { padding:20px 20px 0; display:flex; align-items:center; justify-content:space-between; }
    .list-header h3 { font-family:var(--font-head); font-size:18px; font-weight:800; color:#fff; }
    .list-close { width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.08); border:none; color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .list-body { overflow-y:auto; padding:16px 20px 20px; flex:1; display:grid; gap:10px; }
    .user-row { display:flex; align-items:center; gap:12px; padding:10px; border-radius:12px; background:var(--dark3); cursor:pointer; transition:.15s; text-decoration:none; }
    .user-row:hover { background:rgba(0,200,255,0.06); }
    .user-avatar-sm { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--primary),#0080CC); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:16px; font-weight:800; color:#000; flex-shrink:0; }
    .user-info { flex:1; min-width:0; }
    .user-name { font-family:var(--font-head); font-size:14px; font-weight:700; color:#fff; }
    .user-sub { font-size:11px; color:var(--muted); margin-top:1px; }
    .user-follow-btn { padding:6px 14px; border-radius:9999px; font-family:var(--font-head); font-size:11px; font-weight:700; cursor:pointer; border:none; background:var(--primary-dim); border:1px solid var(--border); color:var(--primary); transition:.2s; flex-shrink:0; }
    .user-follow-btn:hover { background:rgba(0,200,255,0.22); }

    /* EDIT PROFILE MODAL */
    #editModal { position:fixed; inset:0; background:rgba(4,8,18,0.97); backdrop-filter:blur(16px); z-index:9000; display:none; align-items:center; justify-content:center; padding:16px; }
    #editModal.show { display:flex; }
    .edit-box { background:var(--dark2); border:1px solid var(--border); border-radius:24px; width:100%; max-width:440px; padding:28px; max-height:90vh; overflow-y:auto; }
    .edit-box h3 { font-family:var(--font-head); font-size:20px; font-weight:800; color:#fff; margin-bottom:20px; }
    .edit-label { font-size:12px; color:var(--muted); font-weight:600; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; display:block; }
    .edit-input { width:100%; padding:12px 14px; background:var(--dark); border:1.5px solid rgba(255,255,255,0.07); color:#fff; border-radius:11px; font-size:14px; font-family:var(--font-body); outline:none; transition:.2s; margin-bottom:14px; }
    .edit-input:focus { border-color:var(--primary); }
    .edit-input::placeholder { color:var(--muted); }
    textarea.edit-input { resize:vertical; min-height:80px; }
    .edit-actions { display:flex; gap:10px; margin-top:4px; }
    .btn-save { flex:1; padding:13px; border:none; border-radius:11px; font-family:var(--font-head); font-size:14px; font-weight:700; cursor:pointer; background:linear-gradient(135deg,var(--primary),#0080CC); color:#000; transition:.2s; }
    .btn-cancel { flex:1; padding:13px; border:none; border-radius:11px; font-family:var(--font-head); font-size:14px; font-weight:700; cursor:pointer; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:var(--text); transition:.2s; }

    /* AVATAR UPLOAD */
    .avatar-upload-area { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
    .avatar-preview { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,var(--primary),#0080CC); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-size:20px; font-weight:800; color:#000; flex-shrink:0; overflow:hidden; }
    .avatar-preview img { width:100%; height:100%; object-fit:cover; display:none; }
    .btn-upload { padding:9px 16px; border:1px dashed var(--border); border-radius:10px; background:rgba(0,200,255,0.04); color:var(--primary); font-size:12px; font-family:var(--font-head); font-weight:700; cursor:pointer; transition:.2s; }
    .btn-upload:hover { background:rgba(0,200,255,0.1); }
    #avatarFileInput { display:none; }

    /* TOAST */
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--dark2); border:1px solid var(--border); padding:10px 24px; border-radius:9999px; display:none; z-index:99999; font-size:13px; white-space:nowrap; box-shadow:0 8px 28px rgba(0,0,0,0.4); }

    /* EMPTY STATE */
    .empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }
    .empty-state .empty-icon { font-size:40px; margin-bottom:10px; }

    /* NO DATA */
    .no-data { text-align:center; padding:32px; color:var(--muted); font-size:13px; }

    @media(max-width:520px) {
      .badges-grid { grid-template-columns:repeat(2,1fr); }
      .stats-grid { grid-template-columns:repeat(2,1fr); }
    }
  </style>
</head>
<body>
<div class="bg-canvas"><div class="bg-grid"></div></div>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="load-spinner"></div>
  <div style="font-family:var(--font-head);font-size:14px;color:var(--muted);">Loading profile…</div>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="authModal">
  <div class="modal-box">
    <h2>Sign in to VersantPro</h2>
    <p>You need an account to view profiles</p>
    <input class="form-input" type="email" id="loginEmail" placeholder="Email address">
    <input class="form-input" type="password" id="loginPass" placeholder="Password">
    <button class="btn-full" onclick="doLogin()">Sign In</button>
    <div class="auth-err" id="authErr"></div>
    <div class="modal-link"><a href="index.html">← Back to VersantPro</a></div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <a href="index.html" class="header-brand">
    <div class="header-emblem">V</div>
    <div class="header-name"><span>Versant</span> Pro</div>
  </a>
  <div class="header-actions">
    <a href="chat.html" class="btn-chat-header">💬 Messages</a>
    <a href="index.html" class="btn-back">← Home</a>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent" style="display:none;">

  <!-- PROFILE HERO -->
  <div class="profile-hero">
    <div class="hero-cover" id="heroCover"></div>
    <div class="hero-body">
      <div class="avatar-wrap">
        <div style="position:relative;">
          <div class="avatar-ring" id="avatarRing">?</div>
          <img class="avatar-img" id="avatarImg" alt="avatar">
        </div>
        <div class="follow-btn-wrap" id="actionBtns"></div>
      </div>
      <div class="profile-name" id="profileName">—</div>
      <div class="profile-username" id="profileUsername">@—</div>
      <div class="profile-bio" id="profileBio"></div>
      <div class="profile-meta" id="profileMeta"></div>
      <div class="profile-stats">
        <div class="pstat" onclick="openList('followers')">
          <div class="pstat-num" id="followerCount">0</div>
          <div class="pstat-lbl">Followers</div>
        </div>
        <div class="pstat" onclick="openList('following')">
          <div class="pstat-num" id="followingCount">0</div>
          <div class="pstat-lbl">Following</div>
        </div>
        <div class="pstat">
          <div class="pstat-num" id="levelsDoneCount">0</div>
          <div class="pstat-lbl">Levels Done</div>
        </div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabStats" onclick="switchTab('stats')">📊 Stats</button>
    <button class="tab-btn" id="tabLevels" onclick="switchTab('levels')">🎯 Levels</button>
    <button class="tab-btn" id="tabBadges" onclick="switchTab('badges')">🏆 Badges</button>
  </div>

  <!-- STATS TAB -->
  <div id="statsTab">
    <div class="stats-grid" id="statsGrid"></div>
  </div>

  <!-- LEVELS TAB -->
  <div id="levelsTab" style="display:none;">
    <div class="section-title">Recent Completions</div>
    <div class="levels-list" id="levelsList"></div>
  </div>

  <!-- BADGES TAB -->
  <div id="badgesTab" style="display:none;">
    <div class="badges-grid" id="badgesGrid"></div>
  </div>

</div>

<!-- FOLLOWERS / FOLLOWING MODAL -->
<div class="list-modal" id="listModal">
  <div class="list-box">
    <div class="list-header">
      <h3 id="listTitle">Followers</h3>
      <button class="list-close" onclick="closeList()">✕</button>
    </div>
    <div class="list-body" id="listBody"></div>
  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div id="editModal">
  <div class="edit-box">
    <h3>✏️ Edit Profile</h3>

    <div class="avatar-upload-area">
      <div class="avatar-preview" id="editAvatarPreview">?</div>
      <div>
        <button class="btn-upload" onclick="document.getElementById('avatarFileInput').click()">📷 Change Photo</button>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;">JPG, PNG · Max 2MB</div>
      </div>
    </div>
    <input type="file" id="avatarFileInput" accept="image/*" onchange="handleAvatarUpload(this)">

    <label class="edit-label">Display Name</label>
    <input class="edit-input" type="text" id="editName" placeholder="Your name" maxlength="30">

    <label class="edit-label">Bio</label>
    <textarea class="edit-input" id="editBio" placeholder="Tell people about yourself…" maxlength="120"></textarea>

    <label class="edit-label">Location</label>
    <input class="edit-input" type="text" id="editLocation" placeholder="City, Country" maxlength="40">

    <label class="edit-label">Goal</label>
    <input class="edit-input" type="text" id="editGoal" placeholder="e.g. HCL TechBee 2025" maxlength="50">

    <div class="edit-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs, arrayUnion, arrayRemove, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  const firebaseConfig = {
    apiKey:"AIzaSyASKI0u0KBCPz0vg5ro0XhJlSSuWxrW8OU",
    authDomain:"versantpro-7a2af.firebaseapp.com",
    projectId:"versantpro-7a2af",
    storageBucket:"versantpro-7a2af.firebasestorage.app",
    messagingSenderId:"1032992540620",
    appId:"1:1032992540620:web:a77017677625c1fdedff69"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const storage = getStorage(app);

  // Global state
  let ME = null;        // logged-in user
  let TARGET_UID = null; // profile being viewed
  let TARGET_DATA = null;
  let IS_OWN = false;
  let _avatarBase64 = null;

  // Get target UID from URL param
  const params = new URLSearchParams(location.search);
  TARGET_UID = params.get("uid");

  // ── AUTH ──────────────────────────────────────────────────────────────────
  onAuthStateChanged(auth, async user => {
    if (!user) {
      document.getElementById("loadingScreen").style.display = "none";
      document.getElementById("authModal").classList.add("active");
      return;
    }
    ME = user;
    if (!TARGET_UID) TARGET_UID = user.uid; // own profile
    IS_OWN = TARGET_UID === user.uid;
    await loadProfile();
  });

  window.doLogin = async function() {
    const email = document.getElementById("loginEmail").value.trim();
    const pass  = document.getElementById("loginPass").value;
    if (!email || !pass) return setErr("Fill in all fields.");
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      document.getElementById("authModal").classList.remove("active");
    } catch(e) {
      setErr(e.code === "auth/wrong-password" || e.code === "auth/invalid-credential" ? "Wrong email or password." : "Sign in failed.");
    }
  };
  function setErr(m) { document.getElementById("authErr").textContent = m; }

  // ── LOAD PROFILE ──────────────────────────────────────────────────────────
  async function loadProfile() {
    try {
      const snap = await getDoc(doc(db, "users", TARGET_UID));
      if (!snap.exists()) {
        document.getElementById("loadingScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        document.getElementById("mainContent").innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div>Profile not found.</div>`;
        return;
      }

      TARGET_DATA = snap.data();
      renderProfile(TARGET_DATA);

      document.getElementById("loadingScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
    } catch(e) {
      console.error(e);
      document.getElementById("loadingScreen").style.display = "none";
      document.getElementById("mainContent").innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div>Failed to load profile.</div>`;
      document.getElementById("mainContent").style.display = "block";
    }
  }

  function renderProfile(data) {
    const state    = data.state || {};
    const profile  = data.profile || {};
    const name     = data.name || data.displayName || "VersantPro User";
    const username = profile.username || name.toLowerCase().replace(/\s+/g,"_");
    const bio      = profile.bio || "";
    const location = profile.location || "";
    const goal     = profile.goal || "";
    const avatarUrl = profile.avatarUrl || "";
    const followers = data.followers || [];
    const following = data.following || [];
    const completed = state.completedLevels || {};
    const streak    = state.streak || 0;
    const isFollowing = followers.includes(ME?.uid);

    // Avatar
    if (avatarUrl) {
      document.getElementById("avatarImg").src = avatarUrl;
      document.getElementById("avatarImg").style.display = "block";
      document.getElementById("avatarRing").style.display = "none";
    } else {
      document.getElementById("avatarRing").textContent = name.charAt(0).toUpperCase();
    }

    document.getElementById("profileName").textContent = name;
    document.getElementById("profileUsername").textContent = "@" + username;
    document.getElementById("profileBio").textContent = bio;
    document.getElementById("followerCount").textContent = followers.length;
    document.getElementById("followingCount").textContent = following.length;
    document.getElementById("levelsDoneCount").textContent = Object.keys(completed).length;

    // Meta
    const metaEl = document.getElementById("profileMeta");
    let metaHTML = "";
    if (location) metaHTML += `<div class="meta-item">📍 ${location}</div>`;
    if (goal)     metaHTML += `<div class="meta-item">🎯 ${goal}</div>`;
    if (streak)   metaHTML += `<div class="meta-item">🔥 ${streak} day streak</div>`;
    metaEl.innerHTML = metaHTML;

    // Action buttons
    const actionsEl = document.getElementById("actionBtns");
    if (IS_OWN) {
      actionsEl.innerHTML = `<button class="btn-edit-profile" onclick="openEdit()">✏️ Edit Profile</button>`;
    } else {
      actionsEl.innerHTML = `
        <button class="btn-follow ${isFollowing ? 'following' : 'follow'}" id="followBtn" onclick="toggleFollow()">
          ${isFollowing ? '✓ Following' : '+ Follow'}
        </button>
        <a href="chat.html?uid=${TARGET_UID}" class="btn-msg">💬 Message</a>
      `;
    }

    // Stats
    const scores = Object.values(completed).map(l => l.score || 0);
    const avgScore = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
    const bestScore = scores.length ? Math.max(...scores) : 0;
    document.getElementById("statsGrid").innerHTML = `
      <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-val">${Object.keys(completed).length}</div><div class="stat-lbl">Levels Done</div></div>
      <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-val">${bestScore}</div><div class="stat-lbl">Best Score</div></div>
      <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-val">${avgScore}</div><div class="stat-lbl">Avg Score</div></div>
      <div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-val">${streak}</div><div class="stat-lbl">Day Streak</div></div>
      <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-val">${followers.length}</div><div class="stat-lbl">Followers</div></div>
      <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-val">${Object.keys(state.practiceHistory||{}).length}</div><div class="stat-lbl">Days Practiced</div></div>
    `;

    // Levels
    const sortedLevels = Object.entries(completed).sort((a,b) => new Date(b[1].date||0) - new Date(a[1].date||0)).slice(0,10);
    if (sortedLevels.length) {
      document.getElementById("levelsList").innerHTML = sortedLevels.map(([lvl, d]) => {
        const pct = Math.round((d.score/80)*100);
        return `<div class="level-row">
          <div class="level-num">Lv ${lvl}</div>
          <div class="level-info">
            <div class="level-date">${d.date || "—"}</div>
            <div class="level-score-bar"><div class="level-score-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="level-score-num">${d.score}/80</div>
        </div>`;
      }).join("");
    } else {
      document.getElementById("levelsList").innerHTML = `<div class="no-data">No levels completed yet.</div>`;
    }

    // Badges
    const levelCount = Object.keys(completed).length;
    const BADGES = [
      { id:"levelmaster", icon:"🎮", name:"Level Master", earned: levelCount>=1, sub: levelCount>=100?"🥇 Gold":levelCount>=50?"🥈 Silver":levelCount>=10?"🥉 Bronze":levelCount>=1?"⭐ Starter":"Locked", pct: Math.min(levelCount/100*100,100) },
      { id:"streakfire",  icon:"🔥", name:"Streak Fire",  earned: streak>=3, sub: streak>=365?"🥇 1 Year":streak>=30?"🥈 30 Days":streak>=7?"🥉 7 Days":streak>=3?"⭐ 3 Days":"Locked", pct: Math.min(streak/365*100,100) },
      { id:"referrer",    icon:"🤝", name:"Referral Star",earned: (data.state?._referrals||0)>=1, sub: (data.state?._referrals||0)>=10?"🥇 Gold":(data.state?._referrals||0)>=5?"🥈 Silver":(data.state?._referrals||0)>=1?"🥉 Bronze":"Locked", pct: Math.min((data.state?._referrals||0)/10*100,100) }
    ];
    document.getElementById("badgesGrid").innerHTML = BADGES.map(b => `
      <div class="badge-card ${b.earned?"earned":""}">
        <div class="badge-icon">${b.icon}</div>
        <div class="badge-name">${b.name}</div>
        <div class="badge-sub">${b.sub}</div>
        <div class="badge-bar"><div class="badge-bar-fill" style="width:${b.pct}%"></div></div>
      </div>`).join("");
  }

  // ── FOLLOW / UNFOLLOW ─────────────────────────────────────────────────────
  window.toggleFollow = async function() {
    if (!ME || IS_OWN) return;
    const btn = document.getElementById("followBtn");
    const isFollowing = (TARGET_DATA.followers||[]).includes(ME.uid);
    btn.disabled = true;
    try {
      const targetRef = doc(db, "users", TARGET_UID);
      const meRef     = doc(db, "users", ME.uid);
      if (isFollowing) {
        await updateDoc(targetRef, { followers: arrayRemove(ME.uid) });
        await updateDoc(meRef,     { following: arrayRemove(TARGET_UID) });
        TARGET_DATA.followers = (TARGET_DATA.followers||[]).filter(x=>x!==ME.uid);
        btn.className = "btn-follow follow";
        btn.textContent = "+ Follow";
        document.getElementById("followerCount").textContent = (TARGET_DATA.followers||[]).length;
      } else {
        await updateDoc(targetRef, { followers: arrayUnion(ME.uid) });
        await updateDoc(meRef,     { following: arrayUnion(TARGET_UID) });
        if (!TARGET_DATA.followers) TARGET_DATA.followers = [];
        TARGET_DATA.followers.push(ME.uid);
        btn.className = "btn-follow following";
        btn.textContent = "✓ Following";
        document.getElementById("followerCount").textContent = TARGET_DATA.followers.length;
      }
    } catch(e) { showToast("Error updating follow status."); }
    btn.disabled = false;
  };

  // ── FOLLOWERS / FOLLOWING LIST ────────────────────────────────────────────
  window.openList = async function(type) {
    document.getElementById("listTitle").textContent = type === "followers" ? "Followers" : "Following";
    document.getElementById("listBody").innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);">Loading…</div>`;
    document.getElementById("listModal").classList.add("show");
    const uids = type === "followers" ? (TARGET_DATA.followers||[]) : (TARGET_DATA.following||[]);
    if (!uids.length) {
      document.getElementById("listBody").innerHTML = `<div class="no-data">No ${type} yet.</div>`;
      return;
    }
    // Fetch each user
    const users = await Promise.all(uids.map(async uid => {
      try { const s = await getDoc(doc(db,"users",uid)); return s.exists() ? {uid, ...s.data()} : null; }
      catch { return null; }
    }));
    const myFollowing = (await getDoc(doc(db,"users",ME.uid))).data()?.following || [];
    document.getElementById("listBody").innerHTML = users.filter(Boolean).map(u => {
      const name = u.name || u.displayName || "User";
      const levels = Object.keys(u.state?.completedLevels||{}).length;
      const iAmFollowing = myFollowing.includes(u.uid);
      const isMe = u.uid === ME.uid;
      return `<a class="user-row" href="profile.html?uid=${u.uid}">
        <div class="user-avatar-sm">${name.charAt(0).toUpperCase()}</div>
        <div class="user-info">
          <div class="user-name">${name}</div>
          <div class="user-sub">${levels} levels done</div>
        </div>
        ${!isMe ? `<button class="user-follow-btn" onclick="event.preventDefault();quickFollow('${u.uid}',this,${iAmFollowing})">${iAmFollowing ? "✓ Following" : "+ Follow"}</button>` : ""}
      </a>`;
    }).join("") || `<div class="no-data">No users found.</div>`;
  };

  window.quickFollow = async function(uid, btn, isFollowing) {
    btn.disabled = true;
    try {
      const meRef = doc(db, "users", ME.uid);
      const theirRef = doc(db, "users", uid);
      if (isFollowing) {
        await updateDoc(meRef, { following: arrayRemove(uid) });
        await updateDoc(theirRef, { followers: arrayRemove(ME.uid) });
        btn.textContent = "+ Follow";
        btn.onclick = (e) => { e.preventDefault(); quickFollow(uid, btn, false); };
      } else {
        await updateDoc(meRef, { following: arrayUnion(uid) });
        await updateDoc(theirRef, { followers: arrayUnion(ME.uid) });
        btn.textContent = "✓ Following";
        btn.onclick = (e) => { e.preventDefault(); quickFollow(uid, btn, true); };
      }
    } catch(e) { showToast("Error."); }
    btn.disabled = false;
  };

  window.closeList = function() { document.getElementById("listModal").classList.remove("show"); };

  // ── EDIT PROFILE ──────────────────────────────────────────────────────────
  window.openEdit = function() {
    const profile = TARGET_DATA?.profile || {};
    document.getElementById("editName").value     = TARGET_DATA?.name || "";
    document.getElementById("editBio").value      = profile.bio || "";
    document.getElementById("editLocation").value = profile.location || "";
    document.getElementById("editGoal").value     = profile.goal || "";
    const previewEl = document.getElementById("editAvatarPreview");
    previewEl.textContent = (TARGET_DATA?.name||"?").charAt(0).toUpperCase();
    if (profile.avatarUrl) {
      previewEl.innerHTML = `<img src="${profile.avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    }
    document.getElementById("editModal").classList.add("show");
  };

  window.closeEdit = function() { document.getElementById("editModal").classList.remove("show"); };

  window.handleAvatarUpload = function(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 2*1024*1024) { showToast("Image too large! Max 2MB."); return; }
    const reader = new FileReader();
    reader.onload = e => {
      _avatarBase64 = e.target.result;
      document.getElementById("editAvatarPreview").innerHTML = `<img src="${_avatarBase64}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    };
    reader.readAsDataURL(file);
  };

  window.saveProfile = async function() {
    const name     = document.getElementById("editName").value.trim();
    const bio      = document.getElementById("editBio").value.trim();
    const location = document.getElementById("editLocation").value.trim();
    const goal     = document.getElementById("editGoal").value.trim();
    if (!name) { showToast("Name is required!"); return; }
    const saveBtn = document.querySelector(".btn-save");
    saveBtn.textContent = "Saving…"; saveBtn.disabled = true;
    try {
      let avatarUrl = TARGET_DATA?.profile?.avatarUrl || "";
      // Upload avatar to Firebase Storage if new one selected
      if (_avatarBase64) {
        try {
          const blob = await (await fetch(_avatarBase64)).blob();
          const storageRef = ref(storage, `avatars/${ME.uid}`);
          await uploadBytes(storageRef, blob);
          avatarUrl = await getDownloadURL(storageRef);
        } catch(e) { console.warn("Avatar upload failed, keeping existing."); }
      }
      await updateDoc(doc(db, "users", ME.uid), {
        name,
        "profile.bio": bio,
        "profile.location": location,
        "profile.goal": goal,
        "profile.avatarUrl": avatarUrl,
        "profile.username": name.toLowerCase().replace(/\s+/g,"_"),
        updatedAt: serverTimestamp()
      });
      TARGET_DATA.name = name;
      if (!TARGET_DATA.profile) TARGET_DATA.profile = {};
      TARGET_DATA.profile.bio = bio;
      TARGET_DATA.profile.location = location;
      TARGET_DATA.profile.goal = goal;
      TARGET_DATA.profile.avatarUrl = avatarUrl;
      _avatarBase64 = null;
      renderProfile(TARGET_DATA);
      closeEdit();
      showToast("✅ Profile updated!");
    } catch(e) { showToast("Error saving profile."); }
    saveBtn.textContent = "Save Changes"; saveBtn.disabled = false;
  };

  // ── TABS ──────────────────────────────────────────────────────────────────
  window.switchTab = function(tab) {
    ["stats","levels","badges"].forEach(t => {
      document.getElementById(t+"Tab").style.display = t===tab ? "block" : "none";
      document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle("active", t===tab);
    });
  };

  // ── TOAST ─────────────────────────────────────────────────────────────────
  function showToast(msg, dur=2600) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.style.display = "block";
    clearTimeout(window._toastT);
    window._toastT = setTimeout(() => t.style.display="none", dur);
  }
  window.showToast = showToast;
</script>
</body>
</html>
